version: '3.8'

services:
  mcp-platform:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      # Zoho Recruit credentials
      - ZOHO_RECRUIT_CLIENT_ID=${ZOHO_RECRUIT_CLIENT_ID}
      - ZOHO_RECRUIT_CLIENT_SECRET=${ZOHO_RECRUIT_CLIENT_SECRET}
      - ZOHO_RECRUIT_REFRESH_TOKEN=${ZOHO_RECRUIT_REFRESH_TOKEN}
      - ZOHO_RECRUIT_ORG_ID=${ZOHO_RECRUIT_ORG_ID}
      # Anthropic API
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_API_BASE_URL=${ANTHROPIC_API_BASE_URL:-https://api.anthropic.com/v1}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
