spring:
  application:
    name: mcp-client
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      model:
        name: claude-3-5-haiku-20241022 # Claude Haiku model for fast processing
      chat:
        options:
          max-tokens: 8192                          # Sufficient for JSON array responses
          temperature: 0.0
      # Add timeout and retry configuration
      timeout: 60s                                   # Connection timeout
      connect-timeout: 30s                           # Connection establishment timeout
    mcp:
      client:
        type: sync
        request-timeout: 300s                        # 5 minutes
        streamable-http:
          connections:
            my-mcp-server:
              url: ${MCP_SERVER_URL:http://localhost:8080/mcp}
              connect-timeout: 30s
              read-timeout: 60s

logging:
  level:
    root: INFO
    com.mcp.mcp_client: DEBUG
    org.springframework.ai: DEBUG

server:
  port: ${PORT:8081}

# Additional resilience settings
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

