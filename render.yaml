services:
  - type: web
    name: mcp-recruitment-platform
    plan: standard
    runtime: docker
    healthCheckPath: /health
    healthCheckProtocol: http
    envVars:
      - key: ZOHO_RECRUIT_CLIENT_ID
        scope: build
      - key: ZOHO_RECRUIT_CLIENT_SECRET
        scope: build
      - key: ZOHO_RECRUIT_REFRESH_TOKEN
        scope: build
      - key: ZOHO_RECRUIT_ORG_ID
        scope: build
      - key: ANTHROPIC_API_KEY
        scope: build
      - key: ANTHROPIC_API_BASE_URL
        value: https://api.anthropic.com/v1
